<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-title" content="Cosa Comprare" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Cosa Comprare</title>

  <style>
    /* ─── RESET & BASE ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #000000;
      --bg-bubble:   #161616;
      --bg-popup:    #111111;
      --border:      #2a2a2a;
      --separator:   #1e1e1e;
      --green:       #C8FF00;
      --text-1:      #FFFFFF;
      --text-2:      #888888;
      --text-dis:    #444444;
      --footer-bg:   #0a0a0a;
      --font:        -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ─── APP SHELL ────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ─── HEADER ────────────────────────────────────────── */
    #header {
      flex-shrink: 0;
      background: var(--bg);
      border-bottom: 0.5px solid var(--separator);
      padding: 10px 16px 12px;
      text-align: center;
    }

    #header .version {
      font-size: 10px;
      color: var(--text-dis);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    #header .app-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-1);
    }

    /* ─── SYNC BAR ──────────────────────────────────────── */
    #sync-bar {
      flex-shrink: 0;
      background: var(--bg);
      border-bottom: 0.5px solid var(--separator);
      padding: 8px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sync-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--bg-popup);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-2);
      cursor: pointer;
      user-select: none;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    /* ─── CONTENT AREA ──────────────────────────────────── */
    #content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 16px 0;
      position: relative;
      -webkit-overflow-scrolling: touch;
    }

    /* Scrollbar nascosta */
    #content::-webkit-scrollbar { display: none; }
    #content { scrollbar-width: none; }

    .section-label {
      font-size: 10px;
      color: var(--text-dis);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    /* Lista prodotti */
    #lista-prodotti {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-bottom: 90px; /* spazio sopra il footer */
    }

    /* Riga singolo prodotto */
    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bubble-name {
      flex: 1;
      background: var(--bg-bubble);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text-1);
      min-width: 0;
    }

    .bubble-name span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bubble-qty {
      background: var(--green);
      border-radius: 20px;
      padding: 11px 12px;
      min-width: 48px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: #000;
      flex-shrink: 0;
    }

    /* ─── TOAST ANNULLA ─────────────────────────────────── */
    #toast {
      display: none;
      position: fixed;
      top: 12px;
      left: 16px;
      right: 16px;
      z-index: 50;
      background: #0d1a00;
      border: 0.5px solid rgba(200,255,0,0.3);
      border-radius: 20px;
      padding: 9px 14px;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-1);
    }

    #toast.visible { display: flex; }
    #toast.toast-center {
      top: 50%;
      left: 50%;
      right: auto;
      transform: translate(-50%, -50%);
      width: max-content;
      max-width: calc(100vw - 32px);
      justify-content: center;
    }

    #toast .toast-text { font-size: 13px; }

    #toast .btn-undo {
      background: #1e1e1e;
      color: var(--text-1);
      border: none;
      border-radius: 12px;
      padding: 4px 12px;
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
    }

    /* ─── FOOTER ────────────────────────────────────────── */
    #footer {
      flex-shrink: 0;
      background: var(--footer-bg);
      border-top: 0.5px solid var(--separator);
      padding: 0 0 20px;
      position: relative;
    }

    .footer-tabs {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      padding-top: 10px;
    }

    .tab-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--text-dis);
      font-family: var(--font);
      font-size: 10px;
      cursor: pointer;
      padding: 4px 10px;
      flex: 1;
    }

    .tab-btn.active { color: var(--green); }

    .tab-btn svg { width: 22px; height: 22px; }

    /* Placeholder centrale per FAB */
    .tab-fab-placeholder {
      flex: 1;
      min-width: 60px;
    }

    /* FAB ─── */
    #fab {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--green);
      color: #000;
      font-size: 26px;
      font-weight: 300;
      line-height: 1;
      border: 3px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(200,255,0,0.25);
      z-index: 10;
    }

    /* ─── POPUP AGGIUNGI ─────────────────────────────────── */
    #popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      display: none;
      align-items: flex-end;
    }

    #popup-overlay.open { display: flex; }

    #popup-sheet {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg-popup);
      border-radius: 28px 28px 0 0;
      padding: 16px 16px 24px;
    }

    .popup-handle {
      width: 36px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    .popup-title {
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      color: var(--text-1);
      margin-bottom: 14px;
    }

    /* Tab modalità */
    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .mode-tab {
      flex: 1;
      padding: 8px;
      border-radius: 14px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      border: 0.5px solid var(--border);
      background: transparent;
      color: #555;
      transition: all 0.15s ease;
    }

    .mode-tab.active {
      background: var(--green);
      color: #000;
      border-color: var(--green);
    }

    /* Sezione manuale */
    #section-manual { display: flex; flex-direction: column; gap: 10px; }
    #section-import  { display: none;  flex-direction: column; gap: 10px; }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .input-name {
      flex: 1;
      background: #1a1a1a;
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 11px 14px;
      color: var(--text-2);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
    }

    .input-name::placeholder { color: var(--text-dis); }
    .input-name:focus { border-color: var(--green); color: var(--text-1); }

    .input-qty {
      width: 52px;
      background: #1a1a1a;
      border: 0.5px solid var(--green);
      border-radius: 16px;
      padding: 11px 8px;
      color: var(--green);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      outline: none;
      flex-shrink: 0;
    }

    /* Autocomplete */
    #autocomplete-list {
      display: none;
      background: #1a1a1a;
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .autocomplete-item {
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text-2);
      cursor: pointer;
      border-bottom: 0.5px solid var(--separator);
    }

    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: #222; color: var(--text-1); }

    /* Textarea importa */
    .input-textarea {
      width: 100%;
      background: #1a1a1a;
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 11px 14px;
      color: var(--text-2);
      font-family: var(--font);
      font-size: 14px;
      min-height: 80px;
      outline: none;
      resize: none;
    }

    .input-textarea::placeholder { color: var(--text-dis); }
    .input-textarea:focus { border-color: var(--green); color: var(--text-1); }

    /* Bottone principale popup */
    .btn-primary {
      width: 100%;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 16px;
      padding: 12px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-primary:active { opacity: 0.85; }

    .info-panel {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .info-panel span {
      font-size: 12px;
      color: var(--text-2);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ═══════════════════════════════ HEADER ══════════════════════════════ -->
  <header id="header">
    <div class="version">v1.0.3</div>
    <div class="app-title">Cosa Comprare</div>
  </header>

  <!-- ══════════════════════════════ SYNC BAR ═════════════════════════════ -->
  <div id="sync-bar">
    <div class="sync-pill" id="btn-sync">
      <div class="sync-dot"></div>
      <span>Sincronizza &middot; Aggiornato --:--</span>
    </div>
  </div>

  <!-- ════════════════════════════ CONTENT AREA ═══════════════════════════ -->
  <main id="content">

    <!-- Toast annulla (appare in cima al contenuto) -->
    <div id="toast">
      <span class="toast-text">Prodotto rimosso</span>
      <button class="btn-undo">Annulla</button>
    </div>

    <div class="section-label" id="label-count">DA ACQUISTARE &middot; 3</div>

    <div id="lista-prodotti">

      <!-- Riga prodotto esempio 1 -->
      <div class="item-row" data-id="esempio-1">
        <div class="bubble-name"><span>Latte intero</span></div>
        <div class="bubble-qty"><span>2</span></div>
      </div>

      <!-- Riga prodotto esempio 2 -->
      <div class="item-row" data-id="esempio-2">
        <div class="bubble-name"><span>Pane di semola</span></div>
        <div class="bubble-qty"><span>1</span></div>
      </div>

      <!-- Riga prodotto esempio 3 -->
      <div class="item-row" data-id="esempio-3">
        <div class="bubble-name"><span>Pomodori pelati San Marzano</span></div>
        <div class="bubble-qty"><span>4</span></div>
      </div>

    </div>
  </main>

  <!-- ════════════════════════════════ FOOTER ═════════════════════════════ -->
  <footer id="footer">

    <!-- FAB + al centro, sopra il footer -->
    <button id="fab" aria-label="Aggiungi prodotto">+</button>

    <nav class="footer-tabs">

      <!-- Tab: Da acquistare -->
      <button class="tab-btn active" id="tab-lista">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Da acquistare
      </button>

      <!-- Placeholder centrale per il FAB -->
      <div class="tab-fab-placeholder"></div>

      <!-- Tab: Completati -->
      <button class="tab-btn" id="tab-done">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Completati
      </button>

    </nav>
  </footer>

</div><!-- fine #app -->


<!-- ══════════════════════════ POPUP AGGIUNGI ════════════════════════════ -->
<div id="popup-overlay">
  <div id="popup-sheet">

    <div class="popup-handle"></div>
    <div class="popup-title">Aggiungi prodotto</div>

    <!-- Tab modalità -->
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-manual">Manuale</button>
      <button class="mode-tab"        id="tab-import">Importa testo</button>
    </div>

    <!-- Sezione: Manuale -->
    <div id="section-manual">
      <div class="input-row">
        <input class="input-name" id="input-nome" type="text" placeholder="Nome prodotto..." autocomplete="off" />
        <input class="input-qty"  id="input-qty"  type="number" value="1" min="1" max="99" step="1" />
      </div>
      <div id="autocomplete-list">
        <div class="autocomplete-item">Latte</div>
        <div class="autocomplete-item">Pane</div>
        <div class="autocomplete-item">Pasta</div>
      </div>
      <button class="btn-primary" id="btn-add">Aggiungi alla lista</button>
    </div>

    <!-- Sezione: Importa testo -->
    <div id="section-import">
      <textarea class="input-textarea" id="input-import" placeholder="frutta 4, latte 2, pane..."></textarea>
      <button class="btn-primary" id="btn-import">Importa prodotti</button>
    </div>

    <div class="info-panel">
      <span id="info-storico">Storico prodotti: 0 voci</span>
      <span id="info-sync">Ultimo sync: --:--</span>
      <span>v1.0.3</span>
    </div>

  </div>
</div><!-- fine #popup-overlay -->


<script>
// ═══════════════════════════════════════════════════════════════
// BACKEND API
// ═══════════════════════════════════════════════════════════════
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxrJQmeb5vPPWpV_ofIb2clnOKw-MJ9GYQIJXmoXjD_T-2gunerZOraHDyIqe_BORyO/exec";

/** GET con timeout — usato per leggere dati dal backend */
async function _fetchTimeout(url, ms) {
  const ctrl = new AbortController();
  const timer = setTimeout(function() { ctrl.abort(); }, ms);
  try {
    const res = await fetch(url, { signal: ctrl.signal, credentials: 'omit' });
    return await res.json();
  } finally {
    clearTimeout(timer);
  }
}

/**
 * POST fire-and-forget verso GAS.
 * Usa no-cors per evitare il blocco CORS sul redirect 302 di GAS:
 * il body arriva comunque a doPost in e.postData.contents.
 */
function _post(data) {
  fetch(WEBAPP_URL, {
    method:      'POST',
    mode:        'no-cors',
    credentials: 'omit',
    body:        JSON.stringify(data)
  }).catch(function() {});
}

const API = {
  /** Scarica la lista attiva dal foglio Google */
  async getLista() {
    try {
      const data = await _fetchTimeout(WEBAPP_URL + '?action=getLista', 10000);
      if (!data || !data.success) return [];
      return data.data.map(function(r) {
        return {
          id:          r.id,
          nome:        r.nome_prodotto || r.nome || '',
          quantita:    r.quantita,
          timestamp:   r.timestamp_inserimento || r.timestamp || '',
          inserito_da: r.inserito_da || '',
          completato:  r.completato ? 1 : 0
        };
      });
    } catch(e) {
      return [];
    }
  },

  /** Scarica lo storico prodotti dal foglio Google */
  async getStorico() {
    try {
      const data = await _fetchTimeout(WEBAPP_URL + '?action=getStorico', 10000);
      return (data && data.success) ? data.data : [];
    } catch(e) {
      return [];
    }
  },

  /** Aggiunge prodotti al foglio Google (fire-and-forget) */
  addItems(items) {
    _post({ action: 'addItems', items: items });
  },

  /** Rimuove un prodotto dal foglio Google (fire-and-forget) */
  removeItem(id) {
    _post({ action: 'removeItem', id: id });
  },

  /** Segna un prodotto come completato nel foglio (fire-and-forget) */
  completeItem(id) {
    _post({ action: 'completeItem', id: id });
  },

  /** Riporta un prodotto a da-acquistare nel foglio (fire-and-forget) */
  uncompleteItem(id) {
    _post({ action: 'uncompleteItem', id: id });
  }
};

// ═══════════════════════════════════════════════════════════════
// STATO APPLICAZIONE
// ═══════════════════════════════════════════════════════════════
const AppState = {
  listaDaAcquistare: [],
  listaCompletati:   [],
  storicoLocale:     [],
  tabAttivo:         'acquistare',
  popupAperto:       false,
  modalitaPopup:     'manual',
  toastTimer:        null
};

// Dati di test iniziali
AppState.storicoLocale = ["Latte","Pane","Frutta","Cioccolato","Pasta","Olio","Sale","Zucchero","Latte di soia"];
AppState.listaDaAcquistare = [
  { id:"item_1", nome:"Latte",             quantita:2, timestamp:new Date().toISOString(), inserito_da:"igor_daria" },
  { id:"item_2", nome:"Pane integrale con semi di sesamo", quantita:1, timestamp:new Date().toISOString(), inserito_da:"igor_daria" }
];

// ═══════════════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════════════

/** Normalizza il nome: prima lettera maiuscola, resto lower, trim */
function normalizzaNome(str) {
  const s = str.trim().toLowerCase();
  return s.charAt(0).toUpperCase() + s.slice(1);
}

/** Genera un id univoco */
function generaId() {
  return 'item_' + Date.now();
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

/** Renderizza la lista attiva nel DOM */
function renderLista() {
  const container  = document.getElementById('lista-prodotti');
  const labelEl    = document.getElementById('label-count');
  const lista      = AppState.tabAttivo === 'completati'
    ? AppState.listaCompletati
    : AppState.listaDaAcquistare;

  const labelTesto = AppState.tabAttivo === 'completati'
    ? 'COMPLETATI'
    : 'DA ACQUISTARE';

  labelEl.textContent = labelTesto + ' · ' + lista.length;
  container.innerHTML = '';

  // Aggiorna pannello info
  const elStorico = document.getElementById('info-storico');
  const elSync    = document.getElementById('info-sync');
  if (elStorico) elStorico.textContent = 'Storico prodotti: ' + AppState.storicoLocale.length + ' voci';
  if (elSync) {
    const t = localStorage.getItem('cc_sync_time');
    elSync.textContent = 'Ultimo sync: ' + (t || '--:--');
  }

  if (lista.length === 0) {
    const vuoto = document.createElement('div');
    vuoto.style.cssText = 'text-align:center;color:#444;font-size:14px;padding:40px 0;';
    vuoto.textContent = 'Nessun prodotto';
    container.appendChild(vuoto);
    return;
  }

  lista.forEach(function(prodotto) {
    const row = document.createElement('div');
    row.className  = 'item-row';
    row.dataset.id = prodotto.id;
    row.innerHTML  =
      '<div class="bubble-name"><span>' + prodotto.nome + '</span></div>' +
      '<div class="bubble-qty"><span>' + prodotto.quantita + '</span></div>';

    container.appendChild(row);

    if (AppState.tabAttivo === 'acquistare') {
      setupSwipe(
        row,
        function() { completaProdotto(prodotto.id); },
        function() { eliminaProdotto(prodotto.id, 'acquistare'); }
      );
    } else {
      setupSwipe(
        row,
        function() { eliminaProdotto(prodotto.id, 'completati'); },
        function() { eliminaProdotto(prodotto.id, 'completati'); }
      );
    }
  });

}

// ═══════════════════════════════════════════════════════════════
// SWIPE
// ═══════════════════════════════════════════════════════════════

/**
 * Aggiunge gestione swipe touch a un elemento riga.
 * @param {HTMLElement} el
 * @param {Function} onSwipeRight
 * @param {Function} onSwipeLeft
 */
function setupSwipe(el, onSwipeRight, onSwipeLeft) {
  const SOGLIA = 80;
  let startX = 0, startY = 0, currentX = 0, swiping = false, locked = false;

  // Overlay di feedback visivo (sfondo colorato)
  const overlay = document.createElement('div');
  overlay.style.cssText = [
    'position:absolute','inset:0','border-radius:20px',
    'display:flex','align-items:center','padding:0 20px',
    'font-size:12px','font-weight:700','letter-spacing:0.5px',
    'opacity:0','pointer-events:none','transition:opacity 0.1s'
  ].join(';');
  el.style.position = 'relative';
  el.style.overflow = 'hidden';
  el.insertBefore(overlay, el.firstChild);

  const inner = document.createElement('div');
  inner.style.cssText = 'display:flex;width:100%;gap:8px;position:relative;z-index:1;transition:transform 0.25s ease;will-change:transform;';
  // Sposta figli esistenti dentro inner
  Array.from(el.children).forEach(function(c) { if (c !== overlay) inner.appendChild(c); });
  el.appendChild(inner);

  el.addEventListener('touchstart', function(e) {
    if (locked) return;
    startX   = e.touches[0].clientX;
    startY   = e.touches[0].clientY;
    currentX = 0;
    swiping  = false;
    inner.style.transition = 'none';
  }, { passive: true });

  el.addEventListener('touchmove', function(e) {
    if (locked) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    if (!swiping && Math.abs(dy) > Math.abs(dx)) return; // scroll verticale
    swiping  = true;
    currentX = dx;

    inner.style.transform = 'translateX(' + dx + 'px)';

    // Aggiorna overlay
    if (dx > 0) {
      overlay.style.background      = '#1a3300';
      overlay.style.color           = '#C8FF00';
      overlay.style.justifyContent  = 'flex-start';
      overlay.textContent           = '✓  COMPLETATO';
    } else if (dx < 0) {
      overlay.style.background      = '#1a0000';
      overlay.style.color           = '#FF4444';
      overlay.style.justifyContent  = 'flex-end';
      overlay.textContent           = 'ELIMINA  ✕';
    }
    overlay.style.opacity = Math.min(Math.abs(dx) / SOGLIA, 1).toString();
  }, { passive: true });

  el.addEventListener('touchend', function() {
    if (locked || !swiping) return;
    inner.style.transition = 'transform 0.25s ease';

    if (currentX > SOGLIA) {
      locked = true;
      _animaRimozione(el, function() { onSwipeRight(); });
    } else if (currentX < -SOGLIA) {
      locked = true;
      _animaRimozione(el, function() { onSwipeLeft(); });
    } else {
      inner.style.transform = 'translateX(0)';
      overlay.style.opacity = '0';
    }
  });
}

/** Anima la rimozione di una riga e poi chiama la callback */
function _animaRimozione(el, callback) {
  el.style.transition = 'opacity 0.25s ease, max-height 0.3s ease, margin 0.3s ease, padding 0.3s ease';
  el.style.overflow   = 'hidden';
  el.style.maxHeight  = el.offsetHeight + 'px';
  requestAnimationFrame(function() {
    el.style.opacity   = '0';
    el.style.maxHeight = '0';
    el.style.marginBottom = '0';
  });
  el.addEventListener('transitionend', function handler() {
    el.removeEventListener('transitionend', handler);
    callback();
  });
}

/**
 * Mostra il toast con messaggio e callback di annullamento.
 * @param {string} messaggio
 * @param {Function} onAnnulla
 */
function mostraToast(messaggio, onAnnulla, centrato) {
  const toast    = document.getElementById('toast');
  const testoEl  = toast.querySelector('.toast-text');
  const btnUndo  = toast.querySelector('.btn-undo');

  if (AppState.toastTimer) { clearTimeout(AppState.toastTimer); AppState.toastTimer = null; }

  testoEl.textContent = messaggio;
  toast.classList.toggle('toast-center', !!centrato);
  toast.classList.add('visible');

  // Clona il bottone per rimuovere listener precedenti
  const newBtn = btnUndo.cloneNode(true);
  btnUndo.parentNode.replaceChild(newBtn, btnUndo);
  if (onAnnulla) {
    newBtn.style.display = '';
    newBtn.addEventListener('click', function() {
      _nascondiToast();
      onAnnulla();
    });
  } else {
    newBtn.style.display = 'none';
  }

  AppState.toastTimer = setTimeout(_nascondiToast, 3000);
}

function _nascondiToast() {
  document.getElementById('toast').classList.remove('visible');
  if (AppState.toastTimer) { clearTimeout(AppState.toastTimer); AppState.toastTimer = null; }
}

// ═══════════════════════════════════════════════════════════════
// OPERAZIONI LISTA
// ═══════════════════════════════════════════════════════════════

/**
 * Sposta un prodotto da Da Acquistare a Completati.
 * @param {string} id
 */
function completaProdotto(id) {
  const idx = AppState.listaDaAcquistare.findIndex(function(p) { return p.id === id; });
  if (idx === -1) return;
  const prodotto = AppState.listaDaAcquistare.splice(idx, 1)[0];
  AppState.listaCompletati.unshift(prodotto);
  API.completeItem(prodotto.id);
  renderLista();
  mostraToast('Spostato in Completati', function() {
    ripristinaProdotto(prodotto, 'acquistare');
  });
}

/**
 * Elimina un prodotto dalla lista specificata.
 * @param {string} id
 * @param {string} daLista - 'acquistare' | 'completati'
 */
function eliminaProdotto(id, daLista) {
  const lista = daLista === 'completati'
    ? AppState.listaCompletati
    : AppState.listaDaAcquistare;
  const idx = lista.findIndex(function(p) { return p.id === id; });
  if (idx === -1) return;
  const prodotto = lista.splice(idx, 1)[0];
  renderLista();
  mostraToast('Prodotto eliminato', function() {
    ripristinaProdotto(prodotto, daLista);
  });
  // NOTA v1.0: se l'utente preme Annulla dopo che la chiamata completa,
  // la rimozione remota non è reversibile automaticamente.
  API.removeItem(id);
}

/**
 * Reinserisce un prodotto nella lista di origine, ordinando per timestamp.
 * @param {Object} prodotto
 * @param {string} listaOrigine
 */
function ripristinaProdotto(prodotto, listaOrigine) {
  const lista = listaOrigine === 'completati'
    ? AppState.listaCompletati
    : AppState.listaDaAcquistare;
  let inserted = false;
  for (let i = 0; i < lista.length; i++) {
    if (prodotto.timestamp >= lista[i].timestamp) {
      lista.splice(i, 0, prodotto);
      inserted = true;
      break;
    }
  }
  if (!inserted) lista.push(prodotto);
  // Notifica il backend del cambio di stato
  if (listaOrigine === 'acquistare') API.uncompleteItem(prodotto.id);
  else API.completeItem(prodotto.id);
  renderLista();
}

/**
 * Aggiunge un prodotto in cima a listaDaAcquistare.
 * @param {string} nome
 * @param {number} quantita
 * @returns {boolean}
 */
function aggiungiProdotto(nome, quantita) {
  try {
    const nomePulito = normalizzaNome(nome);
    if (!nomePulito) return false;
    const qty = parseInt(quantita, 10);
    if (isNaN(qty) || qty < 1) return false;

    const prodotto = {
      id:          generaId(),
      nome:        nomePulito,
      quantita:    qty,
      timestamp:   new Date().toISOString(),
      inserito_da: 'locale'
    };
    AppState.listaDaAcquistare.unshift(prodotto);

    // Aggiorna storico
    if (!AppState.storicoLocale.some(function(s) {
      return s.toLowerCase() === nomePulito.toLowerCase();
    })) {
      AppState.storicoLocale.push(nomePulito);
    }

    API.addItems([{ nome: nomePulito, quantita: qty }]);

    return true;
  } catch(e) {
    return false;
  }
}

/**
 * Parsa un testo libero nel formato "prodotto quantita, prodotto2, ..."
 * @param {string} testo
 * @returns {Array<{nome:string, quantita:number}>}
 */
function parseTesto(testo) {
  try {
    return testo.split(',')
      .map(function(token) {
        token = token.trim();
        if (!token) return null;
        const parti  = token.split(/\s+/);
        const ultimo = parti[parti.length - 1];
        const qty    = parseInt(ultimo, 10);
        let   nome;
        if (!isNaN(qty) && parti.length > 1) {
          nome = parti.slice(0, -1).join(' ');
        } else {
          nome = parti.join(' ');
        }
        nome = normalizzaNome(nome);
        if (!nome) return null;
        return { nome: nome, quantita: isNaN(qty) ? 1 : Math.max(1, qty) };
      })
      .filter(Boolean);
  } catch(e) {
    return [];
  }
}

/**
 * Importa una stringa di testo come prodotti multipli.
 * @param {string} testo
 * @returns {number} - numero prodotti importati
 */
function importaTesto(testo) {
  const prodotti = parseTesto(testo);
  if (prodotti.length === 0) return 0;

  // Aggiunge allo stato locale senza chiamare API singole
  prodotti.forEach(function(p) {
    const nomePulito = normalizzaNome(p.nome);
    const prodotto = {
      id:          generaId(),
      nome:        nomePulito,
      quantita:    p.quantita,
      timestamp:   new Date().toISOString(),
      inserito_da: 'locale'
    };
    AppState.listaDaAcquistare.unshift(prodotto);
    if (!AppState.storicoLocale.some(function(s) {
      return s.toLowerCase() === nomePulito.toLowerCase();
    })) { AppState.storicoLocale.push(nomePulito); }
  });

  renderLista();

  // Unica chiamata API per tutti i prodotti, con spinner sul bottone
  const btnImport = document.getElementById('btn-import');
  btnImport.textContent = 'Invio in corso...';
  btnImport.disabled = true;

  const payload = prodotti.map(function(p) {
    return { nome: normalizzaNome(p.nome), quantita: p.quantita };
  });

  API.addItems(payload);
  setTimeout(function() {
    btnImport.textContent = 'Importa prodotti';
    btnImport.disabled = false;
  }, 1000);
  return prodotti.length;
}

// ═══════════════════════════════════════════════════════════════
// AUTOCOMPLETAMENTO
// ═══════════════════════════════════════════════════════════════

/** Inizializza il suggerimento nomi dal storico */
function setupAutocompletamento() {
  const input     = document.getElementById('input-nome');
  const acList    = document.getElementById('autocomplete-list');

  input.addEventListener('input', function() {
    const val = input.value.trim();
    acList.innerHTML = '';

    if (val.length < 2) {
      acList.style.display = 'none';
      return;
    }

    const matches = AppState.storicoLocale
      .filter(function(s) { return s.toLowerCase().startsWith(val.toLowerCase()); })
      .slice(0, 5);

    if (matches.length === 0) {
      acList.style.display = 'none';
      return;
    }

    matches.forEach(function(nome) {
      const div  = document.createElement('div');
      div.className = 'autocomplete-item';
      const bold = document.createElement('span');
      bold.style.color = '#C8FF00';
      bold.textContent = nome.slice(0, val.length);
      const rest = document.createElement('span');
      rest.style.color = '#888';
      rest.textContent = nome.slice(val.length);
      div.appendChild(bold);
      div.appendChild(rest);
      div.addEventListener('click', function() {
        input.value = nome;
        acList.style.display = 'none';
        input.focus();
      });
      acList.appendChild(div);
    });

    acList.style.display = 'block';
  });

  // Chiudi se click fuori
  document.addEventListener('click', function(e) {
    if (!acList.contains(e.target) && e.target !== input) {
      acList.style.display = 'none';
    }
  });
}

/**
 * Cambia il tab attivo.
 * @param {string} tab - 'acquistare' | 'completati'
 */
function switchTab(tab) {
  AppState.tabAttivo = tab;
  document.getElementById('tab-lista').classList.toggle('active', tab === 'acquistare');
  document.getElementById('tab-done').classList.toggle('active',  tab === 'completati');
  renderLista();
}

/** Apre il popup di aggiunta prodotti */
function apriPopup() {
  document.getElementById('popup-overlay').classList.add('open');
  AppState.popupAperto = true;
  document.getElementById('input-nome').focus();
}

/** Chiude il popup */
function chiudiPopup() {
  document.getElementById('popup-overlay').classList.remove('open');
  AppState.popupAperto = false;
  document.getElementById('autocomplete-list').style.display = 'none';
}

/**
 * Cambia modalità popup tra manuale e importa.
 * @param {string} modalita - 'manual' | 'import'
 */
function switchModalitaPopup(modalita) {
  AppState.modalitaPopup = modalita;
  document.getElementById('section-manual').style.display = modalita === 'manual' ? 'flex' : 'none';
  document.getElementById('section-import').style.display = modalita === 'import' ? 'flex' : 'none';
  document.getElementById('tab-manual').classList.toggle('active', modalita === 'manual');
  document.getElementById('tab-import').classList.toggle('active', modalita === 'import');
}

/** Aggiorna il testo del bottone import in base ai prodotti validi nella textarea */
function aggiornaContatoreBotoneImport() {
  const textarea  = document.getElementById('input-import');
  const btnImport = document.getElementById('btn-import');
  const n = parseTesto(textarea.value).length;
  btnImport.textContent = n > 0 ? 'Importa ' + n + ' prodotti' : 'Importa prodotti';
}

// SINCRONIZZAZIONE
// ═══════════════════════════════════════════════════════════════

/** Aggiorna la sync pill con un testo e opzionalmente lo stile lampeggiante */
function _suonoConferma() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function _setSyncPill(testo, pulsing) {
  const dot  = document.querySelector('.sync-dot');
  const span = document.querySelector('.sync-pill span');
  if (span) span.textContent = testo;
  if (dot)  dot.style.animation = pulsing ? 'pulse 0.8s infinite' : '';
}

/** Sincronizza lista e storico con il backend Google Apps Script */
async function sincronizza() {
  const oraPrec = localStorage.getItem('cc_sync_time');
  _setSyncPill('Sincronizzazione...', true);
  try {
    const [lista, storico] = await Promise.all([API.getLista(), API.getStorico()]);

    AppState.listaDaAcquistare = lista.filter(function(p) { return !p.completato; });
    AppState.listaCompletati   = lista.filter(function(p) { return  p.completato; });
    if (storico.length > 0) AppState.storicoLocale = storico;

    renderLista();

    const ora = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    localStorage.setItem('cc_lista',     JSON.stringify(lista));
    localStorage.setItem('cc_storico',   JSON.stringify(storico));
    localStorage.setItem('cc_sync_time', ora);

    _setSyncPill('Sincronizza · Aggiornato ' + ora, false);
  } catch(e) {
    _setSyncPill('Errore connessione', false);
    setTimeout(function() {
      const t = localStorage.getItem('cc_sync_time');
      _setSyncPill(t ? 'Sincronizza · Aggiornato ' + t : 'Sincronizza · Aggiornato --:--', false);
    }, 3000);
  }
}

/** Collega tutti i listener ai bottoni e agli input */
function setupUI() {
  // FAB
  document.getElementById('fab').addEventListener('click', apriPopup);

  // Tab footer
  document.getElementById('tab-lista').addEventListener('click', function() { switchTab('acquistare'); });
  document.getElementById('tab-done').addEventListener('click',  function() { switchTab('completati'); });

  // Chiudi popup toccando overlay fuori dal sheet
  document.getElementById('popup-overlay').addEventListener('click', function(e) {
    if (e.target === document.getElementById('popup-overlay')) chiudiPopup();
  });

  // Tab popup modalità
  document.getElementById('tab-manual').addEventListener('click', function() { switchModalitaPopup('manual'); });
  document.getElementById('tab-import').addEventListener('click', function() { switchModalitaPopup('import'); });

  // Bottone Aggiungi (manuale)
  document.getElementById('btn-add').addEventListener('click', function() {
    const nome = document.getElementById('input-nome').value;
    const qty  = document.getElementById('input-qty').value;
    if (aggiungiProdotto(nome, qty)) {
      document.getElementById('input-nome').value = '';
      document.getElementById('input-qty').value  = '1';
      document.getElementById('autocomplete-list').style.display = 'none';
      renderLista();
      if (AppState.tabAttivo !== 'acquistare') switchTab('acquistare');
      mostraToast('✓ ' + nome.trim() + ' aggiunto', null, true);
      if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
      _suonoConferma();
    }
  });

  // Bottone Importa
  document.getElementById('btn-import').addEventListener('click', function() {
    const testo = document.getElementById('input-import').value;
    const n = importaTesto(testo);
    if (n > 0) {
      document.getElementById('input-import').value = '';
      document.getElementById('btn-import').textContent = 'Importa prodotti';
      chiudiPopup();
      if (AppState.tabAttivo !== 'acquistare') switchTab('acquistare');
    }
  });

  // Contatore live sul textarea import
  document.getElementById('input-import').addEventListener('input', aggiornaContatoreBotoneImport);

  // Sync pill → lancia sincronizzazione reale
  document.getElementById('btn-sync').addEventListener('click', function() {
    sincronizza();
  });

  // Tasto Invio nell'input nome
  document.getElementById('input-nome').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('btn-add').click();
  });

}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

/** Inizializza l'applicazione */
function init() {
  setupUI();
  setupAutocompletamento();

  // 1. Carica subito dalla cache locale (offline-first)
  try {
    const cachedLista   = JSON.parse(localStorage.getItem('cc_lista')   || '[]');
    const cachedStorico = JSON.parse(localStorage.getItem('cc_storico') || '[]');
    const cachedTime    = localStorage.getItem('cc_sync_time');
    if (cachedLista.length > 0) {
      AppState.listaDaAcquistare = cachedLista.filter(function(p) { return !p.completato; });
      AppState.listaCompletati   = cachedLista.filter(function(p) { return  p.completato; });
    }
    if (cachedStorico.length > 0) AppState.storicoLocale     = cachedStorico;
    if (cachedTime) _setSyncPill('Sincronizza · Aggiornato ' + cachedTime, false);
  } catch(e) {
    // cache non disponibile
  }

  renderLista();

  // 2. Poi sincronizza in background senza bloccare
  sincronizza();
}

document.addEventListener('DOMContentLoaded', init);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
